<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="55%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="700" fill="url(#bgGradient)"/>

  <!-- Decorative blobs -->
  <circle cx="1320" cy="180" r="220" fill="#4F46E5" opacity="0.06"/>
  <circle cx="1450" cy="540" r="160" fill="#22C55E" opacity="0.10"/>
  <circle cx="1180" cy="600" r="120" fill="#EF4444" opacity="0.08"/>

  <!-- Decorative dots pattern -->
  <g fill="#4F46E5" opacity="0.18">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="140" cy="80" r="3"/>
    <circle cx="180" cy="80" r="3"/>
    <circle cx="100" cy="120" r="3"/>
    <circle cx="140" cy="120" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="100" cy="160" r="3"/>
    <circle cx="140" cy="160" r="3"/>
    <circle cx="180" cy="160" r="3"/>
  </g>

  <!-- LEFT — text content -->
  <g transform="translate(80, 200)">
    <!-- Eyebrow chip -->
    <g>
      <rect x="0" y="0" rx="20" ry="20" width="270" height="36" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="22" cy="18" r="4" fill="#22C55E"/>
      <text x="38" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#4F46E5" letter-spacing="2">
        MULTI-VENDOR MARKETPLACE
      </text>
    </g>

    <!-- Headline -->
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#0F172A" letter-spacing="-1">
      Discover Quality.
    </text>
    <text x="0" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#4F46E5" letter-spacing="-1">
      Shop with Confidence.
    </text>

    <!-- Subhead -->
    <text x="0" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="400" fill="#475569">
      Thousands of products from trusted sellers — delivered to your door.
    </text>

    <!-- CTA Buttons -->
    <g transform="translate(0, 260)">
      <!-- Primary -->
      <rect x="0" y="0" rx="14" ry="14" width="190" height="56" fill="url(#primaryGradient)"/>
      <text x="95" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">
        Shop Now  →
      </text>
      <!-- Secondary -->
      <rect x="210" y="0" rx="14" ry="14" width="200" height="56" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <text x="310" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#0F172A">
        Explore Categories
      </text>
    </g>
  </g>

  <!-- RIGHT — product showcase cluster -->
  <g transform="translate(940, 130)" filter="url(#softShadow)">
    <!-- Card 1: Shopping bag (back, tilted) -->
    <g transform="translate(0, 80) rotate(-8)">
      <rect x="0" y="0" rx="24" ry="24" width="200" height="240" fill="url(#cardGradient)"/>
      <g transform="translate(60, 50)">
        <path d="M10 30 L70 30 L70 90 Q70 110 50 110 L30 110 Q10 110 10 90 Z" fill="#4F46E5"/>
        <path d="M25 30 V20 Q25 4 40 4 Q55 4 55 20 V30" stroke="#4F46E5" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <text x="100" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#0F172A">Free Delivery</text>
    </g>

    <!-- Card 2: Star/Featured (middle, raised) -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" rx="28" ry="28" width="220" height="280" fill="url(#cardGradient)"/>
      <g transform="translate(75, 60)">
        <polygon points="35,0 43,22 67,22 47,36 55,58 35,44 15,58 23,36 3,22 27,22" fill="#F59E0B"/>
      </g>
      <text x="110" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800" fill="#0F172A">Top Quality</text>
      <text x="110" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500" fill="#64748B">Verified Sellers</text>
      <rect x="50" y="225" rx="16" ry="16" width="120" height="32" fill="#EEF2FF"/>
      <text x="110" y="246" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" letter-spacing="1">100% TRUSTED</text>
    </g>

    <!-- Card 3: Heart (back-right, tilted) -->
    <g transform="translate(420, 80) rotate(8)">
      <rect x="0" y="0" rx="24" ry="24" width="200" height="240" fill="url(#cardGradient)"/>
      <g transform="translate(60, 60)">
        <path d="M40 78 Q12 56 12 28 Q12 8 28 8 Q36 8 40 18 Q44 8 52 8 Q68 8 68 28 Q68 56 40 78 Z" fill="#EF4444"/>
      </g>
      <text x="100" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#0F172A">Loved by 10k+</text>
    </g>
  </g>
</svg>
